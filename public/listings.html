<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Food Listings - Excess Food Management</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="container">
  <div class="app-shell">
    <div class="app-header">
      <div class="brand">
        <div class="brand-logo">E</div>
        <div class="brand-text">
          <h1>Food Listings</h1>
          <span id="welcome" class="text-muted"></span>
        </div>
      </div>
      <div class="header-actions">
        <button id="themeToggleBtn" class="btn-ghost">Light</button>
        <a href="/donations.html" id="donationsLink" class="btn-ghost" style="text-decoration:none; display:none;">Donations</a>
        <button id="logoutBtn" class="btn-ghost">Logout</button>
      </div>
    </div>

    <div class="app-body" style="grid-template-columns: minmax(0, 1fr);">
      <section class="panel">
        <div class="panel-header panel-header-stack">
          <div>
            <h2>Available foods</h2>
            <p class="panel-subtitle">
              Non-expired listings from all donors, ordered by nearest expiry.
            </p>
          </div>

          <div class="foods-search foods-search-wide">
            <input id="locationSearchInput" class="foods-search-input foods-search-input-wide" type="text" placeholder="search by location" />
            <div class="foods-filter">
              <button id="locationFilterBtn" class="btn-ghost foods-filter-btn" type="button">Filter</button>
              <div id="locationFilterMenu" class="foods-filter-menu" style="display:none;"></div>
            </div>
          </div>
        </div>

        <div id="foods" class="cards-grid"></div>
      </section>
    </div>
  </div>
</div>

<script>
const API_BASE = "/api";
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");
const name = localStorage.getItem("name");

function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  const btn = document.getElementById("themeToggleBtn");
  if (btn) btn.innerText = theme === "light" ? "Dark" : "Light";
}

const savedTheme = localStorage.getItem("theme");
const initialTheme =
  savedTheme ||
  (window.matchMedia &&
  window.matchMedia("(prefers-color-scheme: light)").matches
    ? "light"
    : "dark");
applyTheme(initialTheme);
window.dispatchEvent(new CustomEvent("theme-changed", { detail: { theme: initialTheme } }));

const themeBtn = document.getElementById("themeToggleBtn");
if (themeBtn) {
  themeBtn.onclick = () => {
    const current = document.documentElement.dataset.theme || "dark";
    const next = current === "light" ? "dark" : "light";
    localStorage.setItem("theme", next);
    applyTheme(next);
    window.dispatchEvent(new CustomEvent("theme-changed", { detail: { theme: next } }));
  };
}

if (!token) window.location.href = "/";
if (role !== "user") window.location.href = "/dashboard.html";

document.getElementById("welcome").innerText =
  "Logged in as " + name + " (" + role + ")";

document.getElementById("logoutBtn").onclick = () => {
  localStorage.clear();
  window.location.href = "/";
};

// Search/filter state
let allFoodsCache = [];
let selectedLocation = "";

function normalize(text) {
  return String(text || "").trim().toLowerCase();
}

function getUniqueLocations(foods) {
  const set = new Set();
  foods.forEach((f) => {
    const loc = String(f?.contact_info || "").trim();
    if (loc) set.add(loc);
  });
  return Array.from(set).sort((a, b) => a.localeCompare(b));
}

function renderLocationMenu() {
  const menu = document.getElementById("locationFilterMenu");
  if (!menu) return;
  const locations = getUniqueLocations(allFoodsCache);
  const items = [
    { label: "All locations", value: "" },
    ...locations.map((l) => ({ label: l, value: l })),
  ];
  menu.innerHTML = items
    .map((it) => {
      const active = it.value === selectedLocation;
      return `<button type="button" class="foods-filter-item${active ? " is-active" : ""}" data-location="${encodeURIComponent(it.value)}">${it.label}</button>`;
    })
    .join("");
}

function renderFoodsList(foods) {
  const container = document.getElementById("foods");
  container.innerHTML = "";
  foods.forEach((f) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="card-header-line">
        <div class="card-title">${f.title}</div>
        <span class="card-chip">Donor: ${f.donor_name || "Unknown"}</span>
      </div>
      <div class="card-body">
        <p>${f.description || ""}</p>
        <div class="card-meta">
          <span><strong>Qty:</strong> ${f.quantity || "N/A"}</span>
          <span><strong>Expires:</strong> ${new Date(f.expiry).toLocaleString()}</span>
          <span><strong>Contact:</strong> ${f.contact_info}</span>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

function applyFoodsFilter() {
  const query = normalize(document.getElementById("locationSearchInput")?.value);
  const selected = normalize(selectedLocation);

  const filtered = allFoodsCache.filter((f) => {
    const loc = normalize(f?.contact_info);
    const matchesSelected = !selected || loc.includes(selected);
    const matchesQuery = !query || loc.includes(query);
    return matchesSelected && matchesQuery;
  });

  renderFoodsList(filtered);
}

async function loadFoods() {
  const res = await fetch(API_BASE + "/foods");
  const foods = await res.json();
  allFoodsCache = Array.isArray(foods) ? foods : [];
  renderLocationMenu();
  applyFoodsFilter();
}

// UI wire-up
document.getElementById("locationSearchInput").addEventListener("input", () => {
  applyFoodsFilter();
});

const filterBtn = document.getElementById("locationFilterBtn");
const filterMenu = document.getElementById("locationFilterMenu");

filterBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  filterMenu.style.display = filterMenu.style.display === "block" ? "none" : "block";
});

filterMenu.addEventListener("click", (e) => {
  const target = e.target;
  if (!(target instanceof HTMLElement)) return;
  const item = target.closest("button[data-location]");
  if (!(item instanceof HTMLElement)) return;
  selectedLocation = decodeURIComponent(item.dataset.location || "");
  renderLocationMenu();
  applyFoodsFilter();
  filterMenu.style.display = "none";
});

document.addEventListener("click", () => {
  filterMenu.style.display = "none";
});

loadFoods();
</script>

<!-- Support Chatbot -->
<div id="support-chat" style="display:none;position:fixed;bottom:20px;right:20px;width:320px;height:420px;background:rgba(15,23,42,0.98);border-radius:14px;border:1px solid rgba(148,163,184,.3);box-shadow:0 20px 40px rgba(0,0,0,.5);z-index:9999">
  <div style="background:linear-gradient(135deg,#22c55e,#16a34a);padding:15px;border-radius:14px 14px 0 0;color:#022c22;font-weight:600;font-size:14px;display:flex;justify-content:space-between">
    <span>🆘 Support Bot</span><button onclick="toggleSupport()" style="background:none;border:none;font-size:20px;cursor:pointer;color:rgba(2,44,34,.8)">×</button>
  </div>
  <div id="support-messages" style="height:300px;padding:15px;overflow-y:auto;background:rgba(15,23,42,.6)"></div>
  <div style="padding:15px;border-top:1px solid rgba(148,163,184,.3);display:flex;gap:8px">
    <input id="support-input" placeholder="Ask support..." style="flex:1;padding:10px;border:1px solid rgba(148,163,184,.3);border-radius:10px;background:rgba(15,23,42,.9);color:#e5e7eb">
    <button onclick="sendSupport()" style="padding:10px 16px;background:#22c55e;color:#022c22;border:none;border-radius:10px;font-weight:600;cursor:pointer">Send</button>
  </div>
</div>
<button id="support-toggle" onclick="toggleSupport()" style="position:fixed;bottom:20px;right:20px;width:55px;height:55px;border-radius:50%;background:#22c55e;border:none;color:#022c22;font-size:20px;box-shadow:0 10px 25px rgba(34,197,94,.4);cursor:pointer;z-index:9998">🆘</button>

<script>
let supportVisible = false;
function applySupportTheme(theme) {
  const isLight = theme === "light";
  const chat = document.getElementById("support-chat");
  const messages = document.getElementById("support-messages");
  const input = document.getElementById("support-input");
  if (chat) {
    chat.style.background = isLight ? "rgba(255,255,255,0.98)" : "rgba(15,23,42,0.98)";
    chat.style.border = isLight ? "1px solid rgba(15,23,42,.15)" : "1px solid rgba(148,163,184,.3)";
    chat.style.boxShadow = isLight ? "0 20px 40px rgba(2,6,23,.15)" : "0 20px 40px rgba(0,0,0,.5)";
  }
  if (messages) {
    messages.style.background = isLight ? "rgba(248,250,252,.9)" : "rgba(15,23,42,.6)";
    messages.style.color = isLight ? "#0f172a" : "#e5e7eb";
  }
  if (input) {
    input.style.background = isLight ? "#ffffff" : "rgba(15,23,42,.9)";
    input.style.border = isLight ? "1px solid rgba(15,23,42,.2)" : "1px solid rgba(148,163,184,.3)";
    input.style.color = isLight ? "#0f172a" : "#e5e7eb";
  }
}
window.addEventListener("theme-changed", (e) => {
  applySupportTheme(e.detail?.theme || "dark");
});
applySupportTheme(document.documentElement.dataset.theme || "dark");

function toggleSupport() {
  document.getElementById("support-chat").style.display = supportVisible
    ? "none"
    : "block";
  document.getElementById("support-toggle").style.opacity = supportVisible
    ? "0.6"
    : "1";
  supportVisible = !supportVisible;
}

async function sendSupport() {
  const input = document.getElementById("support-input");
  const msg = input.value.trim();
  if (!msg) return;
  addSupportMsg("user", msg);
  input.value = "";
  try {
    const res = await fetch("/api/support", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg }),
    });
    const data = await res.json();
    addSupportMsg("bot", data.reply);
  } catch {
    addSupportMsg("bot", "Server error");
  }
}

function addSupportMsg(sender, text) {
  const msgs = document.getElementById("support-messages");
  const div = document.createElement("div");
  const isLight = document.documentElement.dataset.theme === "light";
  if (sender === "user") {
    div.style.cssText =
      "margin:8px auto 8px auto;padding:12px 16px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#022c22;border-radius:16px;max-width:80%;text-align:right";
  } else {
    div.style.cssText = isLight
      ? "margin:8px 0;padding:12px 16px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);border-radius:16px;max-width:80%;color:#0f172a"
      : "margin:8px 0;padding:12px 16px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);border-radius:16px;max-width:80%;color:#e5e7eb";
  }
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

document.getElementById("support-input").addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendSupport();
});
setTimeout(() => addSupportMsg("bot", "🆘 Hi! Need help with login, donations, or app?"), 1500);
</script>
</body>
</html>
